<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Discord Feed</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
<style>
  /* ─── TOKENS ─────────────────────────────────────────────── */
  :root {
    --bg:          #0d0e11;
    --surface:     #16181e;
    --surface2:    #1e2028;
    --border:      #2a2d38;
    --accent:      #5865F2;
    --accent-glow: rgba(88,101,242,.35);
    --green:       #57f287;
    --yellow:      #fee75c;
    --red:         #ed4245;
    --text:        #e3e5e8;
    --muted:       #72767d;
    --mono:        'IBM Plex Mono', monospace;
    --sans:        'Syne', sans-serif;
    --radius:      10px;
  }

  /* ─── RESET ──────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── NOISE OVERLAY ──────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: .025;
    pointer-events: none;
    z-index: 999;
  }

  /* ─── LAYOUT ─────────────────────────────────────────────── */
  .app {
    display: grid;
    grid-template-columns: 260px 1fr;
    grid-template-rows: auto 1fr;
    min-height: 100vh;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ─── TOPBAR ─────────────────────────────────────────────── */
  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }

  .header-left { display: flex; align-items: center; gap: 14px; }

  .guild-icon {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--sans);
    font-weight: 800;
    font-size: 16px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .guild-icon img { width: 100%; height: 100%; object-fit: cover; }

  .guild-name {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -.3px;
  }
  .guild-meta { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--green); margin-right: 4px; }

  /* ─── LOGIN BUTTON ───────────────────────────────────────── */
  .login-area { display: flex; align-items: center; gap: 12px; }

  #loginBtn {
    display: flex; align-items: center; gap: 8px;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 8px 18px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity .2s, box-shadow .2s;
  }
  #loginBtn:hover { opacity: .88; box-shadow: 0 0 16px var(--accent-glow); }

  .user-chip {
    display: none;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 6px 12px 6px 6px;
    border-radius: 99px;
  }
  .user-chip.visible { display: flex; }
  .user-chip img {
    width: 28px; height: 28px;
    border-radius: 50%;
    object-fit: cover;
  }
  .user-chip .uname {
    font-size: 13px;
    font-weight: 500;
  }
  .user-chip .unick {
    font-size: 11px;
    color: var(--accent);
    margin-top: 1px;
  }
  #logoutBtn {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 16px; padding: 2px 4px;
    border-radius: 4px;
    transition: color .2s;
  }
  #logoutBtn:hover { color: var(--red); }

  /* ─── SIDEBAR ────────────────────────────────────────────── */
  aside {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    position: sticky;
    top: 65px;
    height: calc(100vh - 65px);
    overflow-y: auto;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 16px;
    margin-bottom: 6px;
  }

  .channel-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 16px;
    font-size: 14px;
    color: var(--muted);
    cursor: pointer;
    border-radius: 4px;
    margin: 1px 8px;
    transition: background .15s, color .15s;
  }
  .channel-item.active {
    background: var(--surface2);
    color: var(--text);
  }
  .channel-item:hover:not(.active) {
    background: rgba(255,255,255,.04);
    color: var(--text);
  }
  .channel-item .hash { color: var(--muted); font-size: 16px; }

  .members-section { margin-top: 24px; }

  /* ─── MAIN FEED ──────────────────────────────────────────── */
  main {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 65px);
    position: sticky;
    top: 65px;
    overflow: hidden;
  }

  .channel-header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .channel-header .hash { color: var(--muted); font-size: 20px; }
  .channel-header .ch-name {
    font-family: var(--sans);
    font-weight: 600;
    font-size: 16px;
  }
  .channel-header .ch-topic {
    font-size: 12px;
    color: var(--muted);
    margin-left: 8px;
    padding-left: 8px;
    border-left: 1px solid var(--border);
  }

  .toolbar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
  }
  .toolbar button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .toolbar button:hover { background: var(--border); }
  .toolbar button.active { border-color: var(--accent); color: var(--accent); }
  .toolbar .spacer { flex: 1; }
  .toolbar .count { font-size: 12px; color: var(--muted); }

  /* ─── MESSAGES ───────────────────────────────────────────── */
  #feed {
    flex: 1;
    overflow-y: auto;
    padding: 16px 0;
    scroll-behavior: smooth;
  }

  #feed::-webkit-scrollbar { width: 6px; }
  #feed::-webkit-scrollbar-track { background: transparent; }
  #feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg-group {
    padding: 4px 24px;
    display: flex; gap: 14px;
    animation: fadeUp .3s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-group:hover { background: rgba(255,255,255,.02); }

  .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    margin-top: 2px;
    background: var(--surface2);
  }

  .msg-body { flex: 1; min-width: 0; }

  .msg-meta {
    display: flex; align-items: baseline; gap: 8px;
    margin-bottom: 3px;
  }
  .msg-author {
    font-family: var(--sans);
    font-weight: 600;
    font-size: 14px;
    color: var(--text);
  }
  .msg-author.is-me { color: var(--accent); }
  .msg-time {
    font-size: 10px;
    color: var(--muted);
  }

  .msg-content {
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .msg-content a { color: var(--accent); }

  .msg-img {
    max-width: 380px;
    max-height: 280px;
    border-radius: 8px;
    margin-top: 6px;
    display: block;
    object-fit: cover;
    border: 1px solid var(--border);
  }

  .reactions {
    display: flex; flex-wrap: wrap; gap: 4px;
    margin-top: 6px;
  }
  .reaction {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 12px;
    display: flex; align-items: center; gap: 4px;
  }
  .reaction .cnt { color: var(--muted); }

  .reply-badge {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 4px;
    display: flex; align-items: center; gap: 5px;
  }
  .reply-badge::before {
    content: '↩';
    font-size: 13px;
  }

  /* ─── SYSTEM MESSAGE ─────────────────────────────────────── */
  .msg-system {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding: 6px 24px;
    font-style: italic;
  }

  /* ─── DATE DIVIDER ───────────────────────────────────────── */
  .date-divider {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 24px;
    font-size: 11px;
    color: var(--muted);
  }
  .date-divider::before, .date-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ─── LOAD MORE ──────────────────────────────────────────── */
  .load-more-btn {
    display: block;
    margin: 10px auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 20px;
    border-radius: 6px;
    cursor: pointer;
    transition: color .2s, border-color .2s;
  }
  .load-more-btn:hover { color: var(--text); border-color: var(--accent); }

  /* ─── EMPTY / ERROR / LOADING ────────────────────────────── */
  .status-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    height: 100%;
    color: var(--muted);
    font-size: 14px;
  }
  .status-block .icon { font-size: 36px; }
  .error-text { color: var(--red); }

  /* ─── SPINNER ────────────────────────────────────────────── */
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── NEW MSG INDICATOR ──────────────────────────────────── */
  #newMsgBadge {
    display: none;
    position: absolute;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #fff;
    padding: 6px 18px;
    border-radius: 99px;
    font-size: 12px;
    cursor: pointer;
    box-shadow: 0 4px 20px var(--accent-glow);
    animation: pulse 2s ease infinite;
    z-index: 10;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 4px 20px var(--accent-glow); }
    50%       { box-shadow: 0 4px 30px rgba(88,101,242,.6); }
  }

  /* ─── RESPONSIVE ─────────────────────────────────────────── */
  @media (max-width: 700px) {
    .app { grid-template-columns: 1fr; }
    aside { display: none; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- ── HEADER ── -->
  <header>
    <div class="header-left">
      <div class="guild-icon" id="guildIcon">D</div>
      <div>
        <div class="guild-name" id="guildName">Loading…</div>
        <div class="guild-meta">
          <span class="dot"></span>
          <span id="onlineCount">—</span> online ·
          <span id="memberCount">—</span> members
        </div>
      </div>
    </div>

    <div class="login-area">
      <div class="user-chip" id="userChip">
        <img id="userAvatar" src="" alt="" />
        <div>
          <div class="uname" id="userName">—</div>
          <div class="unick" id="userNick"></div>
        </div>
        <button id="logoutBtn" title="Log out">✕</button>
      </div>
      <button id="loginBtn">
        <!-- Discord mark SVG -->
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M13.552 1.007A13.216 13.216 0 0 0 10.27 0c-.145.257-.314.603-.43.878a12.243 12.243 0 0 0-3.678 0A9.194 9.194 0 0 0 5.73 0a13.248 13.248 0 0 0-3.284 1.01C.36 4.104-.22 7.117.07 10.088a13.326 13.326 0 0 0 4.069 2.055c.328-.447.62-.923.873-1.42a8.661 8.661 0 0 1-1.374-.664c.115-.085.228-.173.337-.263 2.65 1.222 5.523 1.222 8.14 0 .11.09.222.178.337.263a8.7 8.7 0 0 1-1.377.665c.253.497.543.974.872 1.42a13.29 13.29 0 0 0 4.072-2.056c.334-3.499-.568-6.484-2.467-9.081ZM5.34 8.26c-.793 0-1.445-.73-1.445-1.625 0-.896.635-1.628 1.445-1.628.81 0 1.458.729 1.444 1.628 0 .895-.634 1.625-1.444 1.625Zm5.319 0c-.793 0-1.445-.73-1.445-1.625 0-.896.635-1.628 1.445-1.628.81 0 1.458.729 1.444 1.628 0 .895-.633 1.625-1.444 1.625Z" fill="currentColor"/>
        </svg>
        Login with Discord
      </button>
    </div>
  </header>

  <!-- ── SIDEBAR ── -->
  <aside>
    <div class="section-label">Channels</div>
    <div class="channel-item active">
      <span class="hash">#</span>
      <span id="sidebarChannelName">loading…</span>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <main>
    <div class="channel-header">
      <span class="hash">#</span>
      <span class="ch-name" id="channelName">…</span>
      <span class="ch-topic" id="channelTopic" style="display:none"></span>
    </div>

    <div class="toolbar">
      <button id="btnRefresh">↻ Refresh</button>
      <button id="btnAutoRefresh" class="active">Auto ●</button>
      <span class="spacer"></span>
      <span class="count" id="msgCount"></span>
    </div>

    <div style="position:relative; flex:1; overflow:hidden; display:flex; flex-direction:column;">
      <div id="feed">
        <div class="status-block">
          <div class="spinner"></div>
          <div>Connecting to Discord…</div>
        </div>
      </div>
      <div id="newMsgBadge">↓ New messages</div>
    </div>
  </main>

</div>

<script>
// ================================================================
//  CONFIG — fill these in  ⚠️
// ================================================================
const WORKER_URL  = "https://linker.youssefm1390.workers.dev";  // <-- your worker URL
const CLIENT_ID   = "1502568957729701980";                 // <-- from Discord Dev Portal
const GUILD_ID    = "1495042315415326790";                             // <-- your server ID
// ================================================================

const REDIRECT_URI = window.location.origin + window.location.pathname;

// ─── STATE ────────────────────────────────────────────────────
let messages        = [];
let oldestId        = null;
let autoRefresh     = true;
let refreshTimer    = null;
let userToken       = null;
let currentUser     = null;
let atBottom        = true;

// ─── DOM ──────────────────────────────────────────────────────
const feed          = document.getElementById("feed");
const loginBtn      = document.getElementById("loginBtn");
const logoutBtn     = document.getElementById("logoutBtn");
const userChip      = document.getElementById("userChip");
const userAvatar    = document.getElementById("userAvatar");
const userName      = document.getElementById("userName");
const userNick      = document.getElementById("userNick");
const newMsgBadge   = document.getElementById("newMsgBadge");
const btnRefresh    = document.getElementById("btnRefresh");
const btnAuto       = document.getElementById("btnAutoRefresh");
const msgCount      = document.getElementById("msgCount");

// ─── HELPERS ──────────────────────────────────────────────────
const escHtml = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

function linkify(text) {
  return escHtml(text).replace(
    /(https?:\/\/[^\s]+)/g,
    '<a href="$1" target="_blank" rel="noopener">$1</a>'
  );
}

function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function formatDate(iso) {
  const d = new Date(iso);
  const now = new Date();
  const yesterday = new Date(now); yesterday.setDate(now.getDate()-1);
  if (d.toDateString() === now.toDateString()) return "Today";
  if (d.toDateString() === yesterday.toDateString()) return "Yesterday";
  return d.toLocaleDateString([], { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}

// ─── GUILD INFO ────────────────────────────────────────────────
async function loadGuildInfo() {
  try {
    const [gRes, cRes] = await Promise.all([
      fetch(`${WORKER_URL}/guild`),
      fetch(`${WORKER_URL}/channel`),
    ]);
    if (gRes.ok) {
      const g = await gRes.json();
      document.getElementById("guildName").textContent = g.name;
      document.getElementById("onlineCount").textContent = g.online_count?.toLocaleString() ?? "—";
      document.getElementById("memberCount").textContent = g.member_count?.toLocaleString() ?? "—";
      const icon = document.getElementById("guildIcon");
      if (g.icon) {
        icon.innerHTML = `<img src="${g.icon}" alt="${escHtml(g.name)}" />`;
      } else {
        icon.textContent = g.name[0];
      }
    }
    if (cRes.ok) {
      const c = await cRes.json();
      document.getElementById("channelName").textContent = c.name;
      document.getElementById("sidebarChannelName").textContent = c.name;
      const topicEl = document.getElementById("channelTopic");
      if (c.topic) { topicEl.textContent = c.topic; topicEl.style.display = ""; }
    }
  } catch(e) { console.warn("Guild info failed", e); }
}

// ─── MESSAGES ─────────────────────────────────────────────────
function renderMessages(msgs, prepend = false) {
  if (!msgs.length) {
    if (!prepend) {
      feed.innerHTML = `<div class="status-block"><div class="icon">💬</div><div>No messages yet.</div></div>`;
    }
    return;
  }

  const sorted = [...msgs].sort((a,b) => BigInt(a.id) < BigInt(b.id) ? -1 : 1);
  let html = "";
  let lastDate = "";

  for (const m of sorted) {
    const dateStr = formatDate(m.timestamp);
    if (dateStr !== lastDate) {
      html += `<div class="date-divider">${escHtml(dateStr)}</div>`;
      lastDate = dateStr;
    }

    // System message types (join, boost, etc.)
    if (m.type !== 0 && m.type !== 19) {
      html += `<div class="msg-system">📌 ${escHtml(m.content || "System message")}</div>`;
      continue;
    }

    const isMe = currentUser && m.author.id === currentUser.id;
    const authorName = isMe
      ? (currentUser.nickname || currentUser.global_name || currentUser.username)
      : (m.author.global_name || m.author.username);

    let inner = "";

    // Reply
    if (m.referenced_message) {
      inner += `<div class="reply-badge">Replying to <strong>${escHtml(m.referenced_message.author || "someone")}</strong>: ${escHtml(m.referenced_message.content?.slice(0,80) || "")}</div>`;
    }

    // Content
    if (m.content) {
      inner += `<div class="msg-content">${linkify(m.content)}</div>`;
    }

    // Attachments
    for (const att of m.attachments || []) {
      if (att.content_type?.startsWith("image/")) {
        inner += `<img class="msg-img" src="${att.url}" alt="${escHtml(att.filename)}" loading="lazy" />`;
      } else {
        inner += `<div class="msg-content"><a href="${att.url}" target="_blank" rel="noopener">📎 ${escHtml(att.filename)}</a></div>`;
      }
    }

    // Reactions
    if (m.reactions?.length) {
      inner += `<div class="reactions">`;
      for (const r of m.reactions) {
        inner += `<div class="reaction">${escHtml(r.emoji)} <span class="cnt">${r.count}</span></div>`;
      }
      inner += `</div>`;
    }

    html += `
      <div class="msg-group" data-id="${m.id}">
        <img class="avatar" src="${m.author.avatar}" alt="${escHtml(m.author.username)}" loading="lazy" />
        <div class="msg-body">
          <div class="msg-meta">
            <span class="msg-author ${isMe ? 'is-me' : ''}">${escHtml(authorName)}</span>
            <span class="msg-time">${formatTime(m.timestamp)}</span>
          </div>
          ${inner}
        </div>
      </div>
    `;
  }

  if (prepend) {
    const prevScroll = feed.scrollHeight - feed.scrollTop;
    feed.insertAdjacentHTML("afterbegin", html);
    feed.scrollTop = feed.scrollHeight - prevScroll;
  } else {
    feed.innerHTML = html;
    scrollToBottom();
  }

  msgCount.textContent = `${messages.length} messages`;
}

function scrollToBottom() {
  feed.scrollTo({ top: feed.scrollHeight, behavior: "smooth" });
  atBottom = true;
  newMsgBadge.style.display = "none";
}

// ─── FETCH MESSAGES ────────────────────────────────────────────
async function fetchMessages(limit = 50, before = null) {
  let url = `${WORKER_URL}/messages?limit=${limit}`;
  if (before) url += `&before=${before}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function loadInitial() {
  feed.innerHTML = `<div class="status-block"><div class="spinner"></div><div>Loading messages…</div></div>`;
  try {
    const msgs = await fetchMessages(50);
    messages = msgs;
    if (msgs.length) oldestId = msgs.reduce((a,b) => BigInt(a.id) < BigInt(b.id) ? a : b).id;
    renderMessages(messages);
  } catch(e) {
    feed.innerHTML = `<div class="status-block error-text"><div class="icon">⚠️</div><div>${escHtml(e.message)}</div></div>`;
  }
}

async function refreshMessages() {
  try {
    const latest  = await fetchMessages(50);
    const existIds = new Set(messages.map(m => m.id));
    const fresh    = latest.filter(m => !existIds.has(m.id));
    if (fresh.length) {
      messages = [...messages, ...fresh];
      // Check if we were at bottom before injecting
      const wasAtBottom = atBottom;
      // Append new messages to DOM
      fresh.sort((a,b) => BigInt(a.id) < BigInt(b.id) ? -1 : 1);
      for (const m of fresh) {
        const tmp = document.createElement("div");
        tmp.innerHTML = "x"; // placeholder — re-render cleaner via full render
      }
      renderMessages(messages);
      if (!wasAtBottom) {
        newMsgBadge.style.display = "block";
      }
    }
  } catch(e) { /* silent */ }
}

// ─── LOAD MORE ─────────────────────────────────────────────────
async function loadOlder() {
  if (!oldestId) return;
  try {
    const older = await fetchMessages(50, oldestId);
    if (!older.length) return;
    const existIds = new Set(messages.map(m => m.id));
    const fresh    = older.filter(m => !existIds.has(m.id));
    messages = [...messages, ...fresh];
    oldestId = older.reduce((a,b) => BigInt(a.id) < BigInt(b.id) ? a : b).id;
    renderMessages(messages);
  } catch(e) { console.warn("Load older failed", e); }
}

// ─── SCROLL TRACKING ──────────────────────────────────────────
feed.addEventListener("scroll", () => {
  const nearBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 80;
  atBottom = nearBottom;
  if (nearBottom) {
    newMsgBadge.style.display = "none";
  }
  // Load older when near top
  if (feed.scrollTop < 100) loadOlder();
});

newMsgBadge.addEventListener("click", scrollToBottom);

// ─── AUTO REFRESH ──────────────────────────────────────────────
function startAutoRefresh() {
  refreshTimer = setInterval(refreshMessages, 5000); // every 5s
}
function stopAutoRefresh() {
  clearInterval(refreshTimer);
}

btnRefresh.addEventListener("click", () => {
  loadInitial();
});

btnAuto.addEventListener("click", () => {
  autoRefresh = !autoRefresh;
  btnAuto.classList.toggle("active", autoRefresh);
  btnAuto.textContent = autoRefresh ? "Auto ●" : "Auto ○";
  if (autoRefresh) startAutoRefresh(); else stopAutoRefresh();
});

// ─── DISCORD OAUTH ────────────────────────────────────────────
function buildOAuthURL() {
  const scopes = encodeURIComponent("identify guilds.members.read");
  return `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&scope=${scopes}`;
}

loginBtn.addEventListener("click", () => {
  window.location.href = buildOAuthURL();
});

logoutBtn.addEventListener("click", () => {
  localStorage.removeItem("dc_token");
  localStorage.removeItem("dc_user");
  userToken   = null;
  currentUser = null;
  userChip.classList.remove("visible");
  loginBtn.style.display = "";
  renderMessages(messages); // re-render to remove 'is-me' highlights
});

function showUser(user) {
  userAvatar.src = user.avatar;
  userName.textContent   = user.global_name || user.username;
  userNick.textContent   = user.nickname ? `@${user.nickname}` : "";
  userChip.classList.add("visible");
  loginBtn.style.display = "none";
}

async function handleOAuthCallback(code) {
  try {
    const res = await fetch(`${WORKER_URL}/oauth/token`, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ code, redirect_uri: REDIRECT_URI }),
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    userToken   = data.access_token;
    currentUser = data.user;
    localStorage.setItem("dc_token", userToken);
    localStorage.setItem("dc_user",  JSON.stringify(currentUser));
    showUser(currentUser);
    // Clean the URL
    history.replaceState({}, "", window.location.pathname);
    renderMessages(messages);
  } catch(e) {
    console.error("OAuth failed", e);
    alert("Login failed: " + e.message);
    history.replaceState({}, "", window.location.pathname);
  }
}

async function restoreSession() {
  const token = localStorage.getItem("dc_token");
  const user  = localStorage.getItem("dc_user");
  if (token && user) {
    try {
      userToken   = token;
      currentUser = JSON.parse(user);
      showUser(currentUser);
      // Re-validate in background
      const res = await fetch(`${WORKER_URL}/me`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (res.ok) {
        currentUser = await res.json();
        localStorage.setItem("dc_user", JSON.stringify(currentUser));
        showUser(currentUser);
        renderMessages(messages);
      } else {
        logoutBtn.click(); // token expired
      }
    } catch(_) {}
  }
}

// ─── BOOT ─────────────────────────────────────────────────────
(async () => {
  await loadGuildInfo();
  await loadInitial();

  // Check for OAuth callback
  const params = new URLSearchParams(window.location.search);
  const code   = params.get("code");
  if (code) {
    await handleOAuthCallback(code);
  } else {
    await restoreSession();
  }

  if (autoRefresh) startAutoRefresh();
})();
</script>
